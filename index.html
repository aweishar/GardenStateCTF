<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defeat</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .message {
            font-size: 2.5rem;
            font-weight: bold;
            border-right: 4px solid #00ff41;
            padding-right: 10px;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(40, end), cursor .4s step-end infinite alternate;
        }

        span.highlight {
            color: #00ff41; /* Classic Terminal Green */
            text-transform: uppercase;
        }

        /* Typing Effect */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes cursor {
            50% { border-color: transparent }
        }
    </style>
</head>
<body>

    <div class="message">
        You will get <span class="highlight">CTRL+Alt+Defeated</span>
    </div>

</body>
</html>
